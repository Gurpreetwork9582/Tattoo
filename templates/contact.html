<!---------- Contact with Social media ---------->
<section class="bg-neutral-primary py-16">
    <div class="mx-auto max-w-screen-md px-4">
        <h2 class="mb-8 text-3xl font-bold text-center text-heading">Contact Me</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button type="button" class="text-white bg-[#3b5998] hover:bg-[#3b5998]/90 focus:ring-4 focus:outline-none focus:ring-[#3b5998]/50 box-border border border-transparent font-medium leading-5 rounded-base text-sm px-4 py-2.5 text-center inline-flex items-center dark:focus:ring-[#3b5998]/55 ">
                <svg class="w-4 h-4 me-1.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M13.135 6H15V3h-1.865a4.147 4.147 0 0 0-4.142 4.142V9H7v3h2v9.938h3V12h2.021l.592-3H12V6.591A.6.6 0 0 1 12.592 6h.543Z" clip-rule="evenodd"/></svg>
                Sign in with Facebook
                </button>
                <button type="button" class="text-white bg-[#4285F4] hover:bg-[#4285F4]/90 focus:ring-4 focus:outline-none focus:ring-[#4285F4]/50 box-border border border-transparent font-medium leading-5 rounded-base text-sm px-4 py-2.5 text-center inline-flex items-center dark:focus:ring-[#4285F4]/55">
                <svg class="w-4 h-4 me-1.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12.037 21.998a10.313 10.313 0 0 1-7.168-3.049 9.888 9.888 0 0 1-2.868-7.118 9.947 9.947 0 0 1 3.064-6.949A10.37 10.37 0 0 1 12.212 2h.176a9.935 9.935 0 0 1 6.614 2.564L16.457 6.88a6.187 6.187 0 0 0-4.131-1.566 6.9 6.9 0 0 0-4.794 1.913 6.618 6.618 0 0 0-2.045 4.657 6.608 6.608 0 0 0 1.882 4.723 6.891 6.891 0 0 0 4.725 2.07h.143c1.41.072 2.8-.354 3.917-1.2a5.77 5.77 0 0 0 2.172-3.41l.043-.117H12.22v-3.41h9.678c.075.617.109 1.238.1 1.859-.099 5.741-4.017 9.6-9.746 9.6l-.215-.002Z" clip-rule="evenodd"/></svg>

            </div>

</section>    
    
<!--------------Contact with email---------------->
<section>
    <div class="mx-auto max-w-screen-md px-4">
        <h2 class="mb-8 text-3xl font-bold text-center text-heading">OR</h2>
        
        <form class="space-y-6">
            <div>
                <label for="name" class="block mb-2 text-sm font-medium text-heading">Your Name</label>
                <input type="text" id="name" placeholder="John Doe" class="w-full px-4 py-3 rounded-base bg-neutral-secondary-medium text-heading placeholder-body border border-default focus:ring-4 focus:ring-brand-medium focus:outline-none">
            </div>

            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-heading">Your Email</label>
                <input type="email" id="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-base bg-neutral-secondary-medium text-heading placeholder-body border border-default focus:ring-4 focus:ring-brand-medium focus:outline-none">
            </div>

            <div>
                <label for="message" class="block mb-2 text-sm font-medium text-heading">Message</label>
                <textarea id="message" rows="6" placeholder="Your message here..." class="w-full px-4 py-3 rounded-base bg-neutral-secondary-medium text-heading placeholder-body border border-default focus:ring-4 focus:ring-brand-medium focus:outline-none"></textarea>
                
                <label class="block mb-2.5 text-sm font-medium text-heading" for="file_input">Upload your ideas</label>
                <input class="cursor-pointer bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full shadow-xs placeholder:text-body" aria-describedby="file_input_help" id="file_input" type="file">

            </div>
            <div>
                <button type="submit" class="w-full text-white bg-brand hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium font-medium rounded-base text-base px-5 py-3 focus:outline-none">
                    Send Message
                </button>
            </div>
        </form>
    </div>
</section>
