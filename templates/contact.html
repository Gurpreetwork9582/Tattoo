<nav class="bg-neutral-primary border-default">

<ul class="hidden text-sm font-medium text-center text-body sm:flex -space-x-px">
    <li class="w-full focus-within:z-10">
        <a href="{{ url_for('index') }}" class="inline-block w-full text-body bg-neutral-primary-soft border border-default rounded-s-base hover:bg-neutral-secondary-medium hover:text-heading focus:ring-4 focus:ring-neutral-secondary-strong font-medium leading-5 text-sm px-4 py-2.5 focus:outline-none" aria-current="page">Home</a>
    </li>
    <li class="w-full focus-within:z-10">
        <a href="{{ url_for('contact') }}" class="inline-block w-full text-body bg-neutral-primary-soft border border-default hover:bg-neutral-secondary-medium hover:text-heading focus:ring-4 focus:ring-neutral-secondary-strong font-medium leading-5 text-sm px-4 py-2.5 focus:outline-none">Contact</a>
    </li>
    <li class="w-full focus-within:z-10">
        <a href="{{ url_for('services') }}" class="inline-block w-full text-body bg-neutral-primary-soft border border-default hover:bg-neutral-secondary-medium hover:text-heading focus:ring-4 focus:ring-neutral-secondary-strong font-medium leading-5 text-sm px-4 py-2.5 focus:outline-none">Services</a>

    <li class="w-full focus-within:z-10">
        <a href="#" class="inline-block w-full text-body bg-neutral-primary-soft border border-default rounded-e-base hover:bg-neutral-secondary-medium hover:text-heading focus:ring-4 focus:ring-neutral-secondary-strong font-medium leading-5 text-sm px-4 py-2.5 focus:outline-none">Pricing</a>

</body>


<section class="bg-neutral-primary py-16">
    <div class="mx-auto max-w-screen-md px-4">
        <h2 class="mb-8 text-3xl font-bold text-center text-heading">Contact Me</h2>
        
        <form class="space-y-6">
            <div>
                <label for="name" class="block mb-2 text-sm font-medium text-heading">Your Name</label>
                <input type="text" id="name" placeholder="John Doe" class="w-full px-4 py-3 rounded-base bg-neutral-secondary-medium text-heading placeholder-body border border-default focus:ring-4 focus:ring-brand-medium focus:outline-none">
            </div>

            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-heading">Your Email</label>
                <input type="email" id="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-base bg-neutral-secondary-medium text-heading placeholder-body border border-default focus:ring-4 focus:ring-brand-medium focus:outline-none">
            </div>

            <div>
                <label for="message" class="block mb-2 text-sm font-medium text-heading">Message</label>
                <textarea id="message" rows="6" placeholder="Your message here..." class="w-full px-4 py-3 rounded-base bg-neutral-secondary-medium text-heading placeholder-body border border-default focus:ring-4 focus:ring-brand-medium focus:outline-none"></textarea>
            </div>

            <button type="submit" class="w-full text-white bg-brand hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium font-medium rounded-base text-base px-5 py-3 focus:outline-none">
                Send Message
            </button>
        </form>
    </div>
</section>


</body>
</html>
