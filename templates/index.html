<!DOCTYPE html>
<html lang="en" class="dark">

<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowbite Flask</title>

<link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

</head>

<body class="bg-neutral-primary">

<!---------- Navigation ---------->

<nav class="bg-neutral-primary border-default">
<div class="max-w-screen-xl mx-auto px-4">

<ul class="flex flex-col sm:flex-row text-sm font-medium text-center text-body">

<li class="flex-1">
<a href="{{ url_for('index') }}"
class="block w-full text-body bg-neutral-primary-soft border border-default sm:rounded-s-base hover:bg-neutral-secondary-medium hover:text-heading px-4 py-3">
Home
</a>
</li>

<li class="flex-1">
<a href="{{ url_for('contact') }}"
class="block w-full text-body bg-neutral-primary-soft border border-default hover:bg-neutral-secondary-medium hover:text-heading px-4 py-3">
Contact
</a>
</li>

<li class="flex-1">
<a href="{{ url_for('services') }}"
class="block w-full text-body bg-neutral-primary-soft border border-default hover:bg-neutral-secondary-medium hover:text-heading px-4 py-3">
Services
</a>
</li>

</ul>

</div>
</nav>


<!---------- Hero Section ---------->

<section
class="bg-center bg-no-repeat bg-cover min-h-[70vh] flex items-center justify-center text-center px-4"
style="background-image: url('{{ url_for('static', filename='Images/bg.jpg') }}');">

<div class="max-w-4xl mx-auto py-16">

<img src="{{ url_for('static', filename='Images/DP1.jpg') }}"
alt="Mehak verma"
class="mx-auto w-40 h-40 sm:w-56 sm:h-56 lg:w-64 lg:h-64 object-cover rounded-full border-4 border-white shadow-lg">

</div>

</section>


<!---------- Gallery ---------->

<section class="bg-neutral-primary py-10 px-4">

<div id="gallery"
class="relative w-full max-w-5xl mx-auto"
data-carousel="slide">

<div class="relative h-64 sm:h-80 md:h-96 lg:h-[500px] overflow-hidden rounded-lg">

<div class="hidden duration-700 ease-in-out" data-carousel-item="active">
<img src="{{ url_for('static', filename='Images/11.jpg') }}"
class="absolute block w-full h-full object-cover">
</div>

<div class="hidden duration-700 ease-in-out" data-carousel-item>
<img src="{{ url_for('static', filename='Images/12.jpg') }}"
class="absolute block w-full h-full object-cover">
</div>

<div class="hidden duration-700 ease-in-out" data-carousel-item>
<img src="{{ url_for('static', filename='Images/13.jpg') }}"
class="absolute block w-full h-full object-cover">
</div>

<div class="hidden duration-700 ease-in-out" data-carousel-item>
<img src="{{ url_for('static', filename='Images/14.jpg') }}"
class="absolute block w-full h-full object-cover">
</div>

<div class="hidden duration-700 ease-in-out" data-carousel-item>
<img src="{{ url_for('static', filename='Images/15.jpg') }}"
class="absolute block w-full h-full object-cover">
</div>

</div>


<button type="button"
class="absolute top-0 left-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group"
data-carousel-prev>

<span class="w-10 h-10 flex items-center justify-center rounded-full bg-black/50 group-hover:bg-black/70 text-white text-xl">
❮
</span>

</button>


<button type="button"
class="absolute top-0 right-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group"
data-carousel-next>

<span class="w-10 h-10 flex items-center justify-center rounded-full bg-black/50 group-hover:bg-black/70 text-white text-xl">
❯
</span>

</button>

</div>

</section>


<!-------------- Footer ---------------->

<footer class="bg-neutral-primary lg:bg-black">

<div class="max-w-screen-xl mx-auto px-4 py-6">

<hr class="my-4 border-default">

<span class="block text-sm text-body text-center">
Mehak Verma Tatoo Artist © 2026 All Rights Reserved.
</span>

</div>

</footer>


<!-------- Bottom Banner ---------->

<div id="bottom-banner"
class="fixed bottom-0 left-0 z-50 w-full bg-neutral-primary border-t border-default">

<div class="max-w-screen-xl mx-auto flex flex-col md:flex-row justify-between items-center px-4 py-3 text-center gap-2">

<p class="text-white italic text-sm md:text-lg">
Welcome to MHK INKS
</p>

<p class="text-white italic text-sm md:text-lg">
111 Vail Street, Moncton, NB
</p>

</div>

</div>

</body>
</html>
